name: Web Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          pnpm install --no-frozen-lockfile 2>&1 | tee pnpm-install.log

      - name: Upload install diagnostics
        if: steps.install.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: pnpm-install-log
          path: pnpm-install.log
          if-no-files-found: error

      - name: Stop on install failure
        if: steps.install.outcome == 'failure'
        run: exit 1

      - name: Lint web
        run: pnpm --filter @fk-templates/web lint

      - name: Typecheck web
        run: pnpm --filter @fk-templates/web typecheck

      - name: Build web
        run: pnpm --filter @fk-templates/web build
